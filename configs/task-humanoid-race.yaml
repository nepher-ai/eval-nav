# Evaluation configuration for task-humanoid-running (deterministic waypoint benchmark)
#
# Evaluates the G1 humanoid race policy on the ``humanoid-waypoint-benchmark-v1``
# envhub bundle — scenarios paired with deterministic start positions, one
# scenario per parallel environment (cycling across envs by env_id % num_scenarios).
#
# Uses navigation.humanoid / v1 scoring:
#   score = success_rate × (0.25 + 0.75 × mean_quality)
#   quality = 0.50×time_efficiency + 0.25×speed_compliance + 0.25×stability
#   speed limit:          2.0 m/s   (G1 race vx_range upper bound)
#   roll/pitch rate limit: 2.0 rad/s (bipedal stability proxy)
#
# Prerequisites:
#   1. Install whole_body_tracking:
#        pip install -e task_humanoid_running/source/whole_body_tracking
#   2. Install nepher (envhub):
#        pip install -e envhub
#   3. Ensure frozen policies exist at:
#        task_humanoid_running/frozen_policies/tracking.pt
#        task_humanoid_running/frozen_policies/velocity.pt

task_name: "Nepher-Race-Waypoint-G1-Envhub-Play-v0"
task_module: "whole_body_tracking"

env_scenes:
  - env_id: "humanoid-waypoint-benchmark-v1"
    scene: 0

seeds:
  - 42

# 50 envs — one per scenario in humanoid-waypoint-benchmark-v1
num_envs: 50

# 5 episodes × 50 envs = 250 rollouts
num_episodes: 5

# Episode length: max scenario waypoints (40) × 5 s/wp = 200 s @ 10 Hz = 2000 steps
max_episode_steps: 2000
max_episode_time_s: 200.0

# Scorer: humanoid race navigation, version 1
# navigation.humanoid supports: v1 (SR-amplified: time + speed + stability)
task_type: "navigation.humanoid"
scoring_version: "v1"

log_dir: "logs/humanoid-race"
enable_logging: true
timeout_seconds: null
policy_path: "default"
